version: '3.8'
services:
  iot-backend:
    build:
      context: .
      dockerfile: Dockerfile.txt
    container_name: iot-backend
    ports:
      - "3101:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - HOIRE_ACCOUNT=${HOIRE_ACCOUNT}
      - HOIRE_PASSWORD=${HOIRE_PASSWORD}
      - APP_URL=${APP_URL}
