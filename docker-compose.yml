version: '3.8'
services:
  iot-backend:
    build:
      context: .
      dockerfile: Dockerfile.txt
      args:
        - VITE_AMAP_KEY=${VITE_AMAP_KEY}
        - VITE_AMAP_SECURITY_CODE=${VITE_AMAP_SECURITY_CODE}
    container_name: iot-backend
    ports:
      - "3101:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - HOIRE_ACCOUNT=${HOIRE_ACCOUNT}
      - HOIRE_PASSWORD=${HOIRE_PASSWORD}
      - APP_URL=${APP_URL}
      - VITE_AMAP_KEY=${VITE_AMAP_KEY}
      - VITE_AMAP_SECURITY_CODE=${VITE_AMAP_SECURITY_CODE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - farmview_data:/app/data

volumes:
  farmview_data:
